<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 貪吃蛇遊戲</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 30px;
        }
        
        /* 這裡是為 Logo 新增的樣式 */
        .logo {
            width: 150px; /* 控制 Logo 的大小 */
            height: auto;
            border-radius: 20px; /* 圓角效果 */
            box-shadow: 0 0 15px rgba(26, 188, 156, 0.8); /* 霓虹發光效果 */
            margin-bottom: 15px;
        }

        canvas {
            background-color: #34495e;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #1abc9c;
            border-radius: 5px;
        }
        .header {
            text-align: center;
            margin-bottom: 15px;
        }
        h1 {
            margin: 10px 0;
            font-size: 28px;
        }
        #score {
            font-size: 24px;
            font-weight: bold;
            color: #f1c40f;
        }
        .instructions {
            margin-top: 15px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.jpg" alt="遊戲 Logo" class="logo">
        <h1>🐍 經典貪吃蛇</h1>
        <div id="score">分數: 0</div>
    </div>

    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="instructions">
        <p>控制方式：使用鍵盤的 ⬆️ ⬇️ ⬅️ ➡️ 方向鍵來控制</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const box = 20;
        let score = 0;
        let snake = [];
        snake[0] = { x: 9 * box, y: 10 * box };

        let food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };

        let d;
        document.addEventListener("keydown", direction);

        function direction(event) {
            if (event.keyCode == 37 && d != "RIGHT") { d = "LEFT"; }
            else if (event.keyCode == 38 && d != "DOWN") { d = "UP"; }
            else if (event.keyCode == 39 && d != "LEFT") { d = "RIGHT"; }
            else if (event.keyCode == 40 && d != "UP") { d = "DOWN"; }
        }

        function collision(head, array) {
            for (let i = 0; i < array.length; i++) {
                if (head.x == array[i].x && head.y == array[i].y) {
                    return true;
                }
            }
            return false;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#1abc9c" : "#16a085";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "#2c3e50";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d == "LEFT") snakeX -= box;
            if (d == "UP") snakeY -= box;
            if (d == "RIGHT") snakeX += box;
            if (d == "DOWN") snakeY += box;

            if (snakeX == food.x && snakeY == food.y) {
                score++;
                document.getElementById("score").innerText = "分數: " + score;
                food = {
                    x: Math.floor(Math.random() * 19 + 1) * box,
                    y: Math.floor(Math.random() * 19 + 1) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                ctx.fillStyle = "white";
                ctx.font = "40px Arial";
                ctx.fillText("Game Over!", 100, 200);
            }

            snake.unshift(newHead);
        }

        let game = setInterval(draw, 100);
    </script>
</body>
</html>
